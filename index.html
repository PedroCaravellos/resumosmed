  *{ box-sizing: border-box; }

  .input::placeholder{ color: var(--muted); }

  /* Card styles (TWEAKABLE) */

  [data-card="outline"] .card{ background: transparent; border: 1.5px solid var(--line-strong); border-radius: var(--radius-md); box-shadow: none; }

  [data-card="sticker"] .card:nth-child(3n){ transform: rotate(-.6deg); }
  [data-card="sticker"] .card:nth-child(3n+1){ transform: rotate(.4deg); }

  /* Marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee{ overflow: hidden; }
  .marquee-track{ display: inline-flex; gap: 56px; padding: 0 28px; white-space: nowrap; animation: marquee 38s linear infinite; will-change: transform; }

  /* Blob blink (decorative) */
  @keyframes wiggle { 0%,100%{ transform: rotate(-3deg);} 50%{ transform: rotate(3deg);} }
  @keyframes float { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} }
  @keyframes ecg-dash { to { stroke-dashoffset: -1000; } }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  @keyframes spin-logo {
    0%   { transform: rotate(0deg)   scale(1);    }
    30%  { transform: rotate(120deg) scale(1.12); }

    100% { transform: rotate(360deg) scale(1);    }
  }
  @keyframes spin-logo-fade {

  /* Page transition */
  @keyframes pageIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
  .pagewrap{ animation: pageIn .32s cubic-bezier(.2,.7,.1,1); }

  /* Focus rings */
  :focus-visible{ outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 6px; }

  /* anti-piracy: bloqueia print de toda a página */
  @media print {
    body * { visibility: hidden !important; }

      content: "Impressão bloqueada — conteúdo protegido por watermark de rastreio.";

  /* Reader click zones — mostram setas no hover */
  .reader-zone:hover .reader-zone-arrow{ opacity: 1 !important; transform: translateY(-50%) scale(1.06); }
  .reader-zone:hover.reader-zone-prev{ background: linear-gradient(to right, color-mix(in oklab, var(--fg) 8%, transparent), transparent) !important; }
  .reader-zone:hover.reader-zone-next{ background: linear-gradient(to left,  color-mix(in oklab, var(--fg) 8%, transparent), transparent) !important; }

  /* anti-piracy: blur quando a janela perde o foco */
  body.__blurred .pdf-reader-frame canvas{
    filter: blur(18px) saturate(0);
    transition: filter .2s ease;
  }
  body.__blurred .pdf-reader-frame::after{
    content: "Conteúdo oculto enquanto a janela está fora de foco";
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: var(--fg); font-weight: 600; font-size: 16px;
    background: color-mix(in oklab, var(--surface) 78%, transparent);
    z-index: 50; pointer-events: none;
    backdrop-filter: blur(2px);

  .col{ display:flex; flex-direction:column; }

  /* ── Hero entrance stagger ── */
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  [data-hero-stagger] > *:nth-child(1){ --i:0; }
  [data-hero-stagger] > *:nth-child(2){ --i:1; }
  [data-hero-stagger] > *:nth-child(3){ --i:2; }
  [data-hero-stagger] > *:nth-child(4){ --i:3; }
  [data-hero-stagger] > *:nth-child(5){ --i:4; }
  [data-hero-stagger] > *:nth-child(6){ --i:5; }
  [data-hero-stagger] > * {
    animation: heroIn 0.75s cubic-bezier(.16,1,.3,1) both;
    animation-delay: calc(var(--i, 0) * 110ms + 60ms);
  }

  /* ── Scroll reveal ── */
  @media (prefers-reduced-motion: no-preference) {
    [data-reveal] {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 0.7s cubic-bezier(.16,1,.3,1),

  <!-- ── Monitoramento de erros (Sentry) ───────────────────────────────── -->
  <!-- Loader script específico do projeto resumosmed — auto-inicializa     -->
  <script
    src="https://js.sentry-cdn.com/ca456f7fd2822ac6fb4aa8a4b40ec545.min.js"
    crossorigin="anonymous"
  ></script>
  <script>
    (function(){
      // Gera session ID único para rastreabilidade ponta-a-ponta
      window.__SESSION_ID = (Date.now().toString(36) + Math.random().toString(36).slice(2)).slice(0, 12);

      // Captura erros JS não tratados
      window.onerror = function(msg, src, line, col, err) {
        var data = { msg: String(msg), src: src, line: line, session_id: window.__SESSION_ID };
        if (window.Sentry) window.Sentry.captureException(err || new Error(String(msg)));
        console.error(JSON.stringify({ level: "error", service: "frontend", event: "js_error", ts: new Date().toISOString(), ...data }));
      };

      window.addEventListener("unhandledrejection", function(e) {
        var reason = e.reason;
        var msg = reason instanceof Error ? reason.message : String(reason);
        var data = { event: "unhandled_rejection", msg: msg, session_id: window.__SESSION_ID };
        if (window.Sentry) window.Sentry.captureException(reason instanceof Error ? reason : new Error(msg));
        console.error(JSON.stringify({ level: "error", service: "frontend", ts: new Date().toISOString(), ...data }));
      });
    })();
  </script>

  <script>
  (function(){
    var seen = new WeakSet();
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('revealed'); io.unobserve(e.target); }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -48px 0px' });

    function scan(){
      document.querySelectorAll('[data-reveal-stagger]').forEach(function(p){
        var type = p.getAttribute('data-reveal-stagger') || '';
        Array.from(p.children).forEach(function(c, i){
          if(seen.has(c)) return;
          if(!c.hasAttribute('data-reveal')) c.setAttribute('data-reveal', type);
          c.style.setProperty('--reveal-delay', (i * 130) + 'ms');
          io.observe(c); seen.add(c);
        });
      });
      document.querySelectorAll('[data-reveal]').forEach(function(el){
        if(!seen.has(el)){ io.observe(el); seen.add(el); }
      });
    }

    window.addEventListener('load', function(){
      scan();
      new MutationObserver(scan).observe(
        document.getElementById('root'), { childList: true, subtree: true }
      );
    });
  })();
  </script>
